services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongo:27017/challenge_tech_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/rails
    command: ./bin/rails server -b 0.0.0.0

  sidekiq:
    build: .
    environment:
      MONGODB_URI: mongodb://mongo:27017/challenge_tech_development
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
    depends_on:
      - mongo
      - redis
    volumes:
      - .:/rails
    command: bundle exec sidekiq

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mongo_data:
